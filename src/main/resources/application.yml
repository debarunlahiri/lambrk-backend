server:
  address: 0.0.0.0
  port: 9500
  shutdown: graceful
  tomcat:
    threads:
      max: 50
      min-spare: 5
    connection-timeout: 20000ms
    accept-count: 50

spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  main:
    lazy-initialization: true
  application:
    name: lambrk-backend
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
  profiles:
    active: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/lambrk
    username: debarunlahiri
    password: 8ivhaah8
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000
      leak-detection-threshold: 30000
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        query:
          plan_cache_max_size: 512
          in_clause_parameter_padding: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=5m,recordStats

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
    mongodb:
      uri: ${MONGODB_URI:mongodb://lambrk:lambrk123@localhost:27017/lambrk?authSource=admin}
      auto-index-creation: true

  # CORS Configuration
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:4200,https://lambrk-frontend.example.com"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD"
    allowed-headers: "Authorization,Content-Type,X-Requested-With,Accept,Origin,X-Correlation-Id,X-Total-Count,Cache-Control,Pragma"
    allow-credentials: true
    max-age: 3600

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true
      bindings:
        postCreated:
          destination: post.created
          content-type: application/json
        postUpdated:
          destination: post.updated
          content-type: application/json
        commentCreated:
          destination: comment.created
          content-type: application/json
        voteCast:
          destination: vote.cast
          content-type: application/json

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-key}
      chat:
        options:
          model: gpt-4
          temperature: 0.7
          max-tokens: 1000

# AWS S3 Configuration
aws:
  s3:
    enabled: true
    region: ${AWS_REGION:ap-south-1}
    bucket: ${AWS_S3_BUCKET:lm-sm-001}
    endpoint: ${AWS_S3_ENDPOINT:} # Leave empty for production AWS, set for MinIO/local
    presigned-url-expiry: 3600 # 1 hour
    cdn-base-url: ${AWS_S3_CDN_BASE_URL:https://d2l1t2x4807mjw.cloudfront.net}
  access-key: ${AWS_ACCESS_KEY_ID:}
  secret-key: ${AWS_SECRET_ACCESS_KEY:}

# Logging Configuration
# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:lambrk-backend-secret-key-for-jwt-tokens-2024-change-in-production}
    expiration: 86400 # 24 hours in seconds
    refresh-expiration: 604800 # 7 days in seconds
    issuer: lambrk-backend
    audience: lambrk-frontend
  logging:
    enabled: true
    log-request-body: true
    log-response-body: true
    max-body-size: 10000
    sensitive-headers: authorization,cookie,x-api-key
  upload:
    directory: uploads
    max-file-size: 62914560 # 60MB
    allowed-types: image/jpeg,image/png,image/gif,video/mp4,image/webp
  free-tier:
    enabled: true
    storage-limit-mb: 5120 # 5GB
    monthly-upload-limit: 100
    monthly-bandwidth-gb: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      group:
        readiness:
          include: db
        liveness:
          include: ping
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: false
      percentiles:
        http.server.requests: 0.5,0.95,0.99
      sla:
        http.server.requests: 50ms,100ms,500ms,1s,5s
    tags:
      application: lambrk-backend
    enable:
      jvm: true
      system: false
      process: false
  tracing:
    sampling:
      probability: 0.05
    enabled: false
  otlp:
    tracing:
      enabled: false
    metrics:
      export:
        enabled: false
  info:
    env:
      enabled: false
    build:
      enabled: false
    git:
      mode: simple

resilience4j:
  circuitbreaker:
    instances:
      postService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      commentService:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 45s
        failureRateThreshold: 60
        eventConsumerBufferSize: 10

  retry:
    instances:
      postService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - org.springframework.dao.DataAccessException
          - org.springframework.web.client.ResourceAccessException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$BadRequest
      commentService:
        maxAttempts: 2
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.dao.DataAccessException

  bulkhead:
    instances:
      postService:
        maxConcurrentCalls: 10
        maxWaitDuration: 100ms
      commentService:
        maxConcurrentCalls: 20
        maxWaitDuration: 50ms

  ratelimiter:
    instances:
      postCreation:
        limitForPeriod: 100
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true
      commentCreation:
        limitForPeriod: 500
        limitRefreshPeriod: 1m
        timeoutDuration: 0
        registerHealthIndicator: true

logging:
  level:
    root: INFO
    com.lambrk: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    com.lambrk.service.LoggingService: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
  file:
    name: logs/lambrk-backend.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7
      clean-history-on-start: false

---
spring:
  config:
    activate:
      on-profile: dev
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:h2:file:./data/lambrk-dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false
  cache:
    type: simple
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://lambrk:lambrk123@localhost:27017/lambrk?authSource=admin}
