version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lambrk-postgres
    environment:
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lambrk_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: lambrk-auth-service
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      PORT: 4401
    ports:
      - "4401:4401"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules

  video-service:
    build:
      context: ./services/video-service
      dockerfile: Dockerfile
    container_name: lambrk-video-service
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
      PORT: 4402
      AUTH_SERVICE_URL: http://auth-service:4401
    ports:
      - "4402:4402"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/video-service:/app
      - /app/node_modules
      - ./uploads:/app/uploads

  bitz-service:
    build:
      context: ./services/bitz-service
      dockerfile: Dockerfile
    container_name: lambrk-bitz-service
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
      PORT: 4403
      AUTH_SERVICE_URL: http://auth-service:4401
    ports:
      - "4403:4403"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/bitz-service:/app
      - /app/node_modules
      - ./uploads:/app/uploads

  posts-service:
    build:
      context: ./services/posts-service
      dockerfile: Dockerfile
    container_name: lambrk-posts-service
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
      PORT: 4404
      AUTH_SERVICE_URL: http://auth-service:4401
    ports:
      - "4404:4404"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/posts-service:/app
      - /app/node_modules

  interaction-service:
    build:
      context: ./services/interaction-service
      dockerfile: Dockerfile
    container_name: lambrk-interaction-service
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
      PORT: 4405
      AUTH_SERVICE_URL: http://auth-service:4401
    ports:
      - "4405:4405"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/interaction-service:/app
      - /app/node_modules

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: lambrk-gateway
    environment:
      NODE_ENV: development
      PORT: 4400
      AUTH_SERVICE_URL: http://auth-service:4401
      VIDEO_SERVICE_URL: http://video-service:4402
      BITZ_SERVICE_URL: http://bitz-service:4403
      POSTS_SERVICE_URL: http://posts-service:4404
      INTERACTION_SERVICE_URL: http://interaction-service:4405
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4400}
    ports:
      - "4400:4400"
    depends_on:
      - auth-service
      - video-service
      - bitz-service
      - posts-service
      - interaction-service

volumes:
  postgres_data:

