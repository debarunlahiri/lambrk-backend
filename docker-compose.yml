version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lambrk-postgres
    environment:
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lambrk_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: lambrk-auth-service
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      PORT: 3101
    ports:
      - "3101:3101"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules

  video-service:
    build:
      context: ./services/video-service
      dockerfile: Dockerfile
    container_name: lambrk-video-service
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lambrk_user
      POSTGRES_PASSWORD: lambrk_password
      POSTGRES_DB: lambrk
      PORT: 3102
      AUTH_SERVICE_URL: http://auth-service:3101
    ports:
      - "3102:3102"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/video-service:/app
      - /app/node_modules
      - ./uploads:/app/uploads

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: lambrk-gateway
    environment:
      NODE_ENV: development
      PORT: 3100
      AUTH_SERVICE_URL: http://auth-service:3101
      VIDEO_SERVICE_URL: http://video-service:3102
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3100}
    ports:
      - "3100:3100"
    depends_on:
      - auth-service
      - video-service

volumes:
  postgres_data:

